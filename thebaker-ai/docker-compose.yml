version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}  # Injects security key locally without hardcoding
    volumes:
      - .:/app  # Live syncs code directories for rapid iteration

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend # Ensures API spins up before UI mounts
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000 
